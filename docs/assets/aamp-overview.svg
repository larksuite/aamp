  <text x="112" y="380" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">Workflow adapter</text>

  <rect x="480" y="206" width="240" height="232" rx="20" fill="#111827" stroke="#60A5FA" stroke-width="2"/>
